name: AI Cloud Memory

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Nur testen, keine Cloud-Daten schreiben"
        required: false
        default: "false"
  schedule:
    # GitHub schedule events can be delayed. The scheduled run is only a
    # watchdog; the job itself performs the checks every five minutes.
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: ai-cloud-memory-${{ github.event_name == 'schedule' && 'scheduled' || github.run_id }}
  cancel-in-progress: false

jobs:
  watch-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 345

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: .signal-alert-state.json
          key: signal-state-${{ github.run_id }}
          restore-keys: |
            signal-state-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run signal watcher every five minutes
        env:
          SIGNAL_SYMBOL: XAUUSD
          SIGNAL_DATA_PROVIDER: yahoo
          SIGNAL_ALLOW_YAHOO_FALLBACK: "0"
          SIGNAL_THRESHOLD: "80"
          SIGNAL_COOLDOWN_MINUTES: "45"
          SIGNAL_STATE_PATH: .signal-alert-state.json
          SIGNAL_CLOUD_MEMORY: "1"
          SIGNAL_REQUIRE_CLOUD_MEMORY: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '1' || '0' }}
        shell: bash
        run: |
          checks=1
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            checks=66
          fi

          for check in $(seq 1 "$checks"); do
            echo "::group::Gold check $check/$checks - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            if node automation/ai-signal-watch.mjs; then
              echo "Gold check completed."
            else
              echo "::warning::Gold check failed temporarily; the watcher will retry in five minutes."
            fi
            echo "::endgroup::"

            if [[ "$check" -lt "$checks" ]]; then
              sleep 300
            fi
          done

      - name: Ensure alert state exists
        if: always()
        run: test -f .signal-alert-state.json || echo '{}' > .signal-alert-state.json

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .signal-alert-state.json
          key: signal-state-${{ github.run_id }}
